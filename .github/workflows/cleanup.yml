name: Cleanup old EXE assets

on:
  release:
    types:
      - published

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete EXE assets from older releases
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const releases = await github.paginate(
              github.rest.repos.listReleases,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
              }
            );

            const publishedReleases = releases
              .filter((release) => !release.draft)
              .sort(
                (a, b) =>
                  new Date(b.published_at || b.created_at) -
                  new Date(a.published_at || a.created_at)
              );

            const olderReleases = publishedReleases.slice(1);

            for (const release of olderReleases) {
              const exeAssets = release.assets.filter((asset) =>
                asset.name.toLowerCase().endsWith('.exe')
              );

              for (const asset of exeAssets) {
                await github.rest.repos.deleteReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                });
              }
            }