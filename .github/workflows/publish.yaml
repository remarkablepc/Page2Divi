name: Publish Public Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*'

permissions:
  contents: read
  actions: read

concurrency:
  group: publish-public-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PUBLIC_REPO: remarkablepc/Page2Divi
      MAC_ARTIFACT_NAME: Page2Divi-macos-universal2
      WINDOWS_ARTIFACT_NAME: Page2Divi-windows
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag, README, and access
        id: validate
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME:-}"

          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            echo "This workflow must run from a tag reference." >&2
            exit 1
          fi

          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9][0-9]$ ]]; then
            echo "Tag does not match required version format: $VERSION" >&2
            exit 1
          fi

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "GH_TOKEN is missing." >&2
            exit 1
          fi

          gh api "repos/${GITHUB_REPOSITORY}" >/dev/null

          if ! git ls-remote "https://x-access-token:${GH_TOKEN}@github.com/${PUBLIC_REPO}.git" >/dev/null 2>&1; then
            echo "GH_TOKEN is invalid or the public repo cannot be cloned." >&2
            exit 1
          fi

          if [[ ! -f README.md ]]; then
            echo "README.md is missing." >&2
            exit 1
          fi

          if ! grep -F "$VERSION" README.md >/dev/null; then
            echo "README.md is missing the tag version string: $VERSION" >&2
            exit 1
          fi

          mapfile -t README_VERSIONS < <(grep -oE 'v[0-9]+\.[0-9][0-9]' README.md | sort -u)
          if [[ "${#README_VERSIONS[@]}" -eq 0 ]]; then
            echo "README.md does not contain any release version string." >&2
            exit 1
          fi

          if [[ "${#README_VERSIONS[@]}" -ne 1 || "${README_VERSIONS[0]}" != "$VERSION" ]]; then
            echo "README.md version does not match tag $VERSION." >&2
            printf 'README versions found: %s\n' "${README_VERSIONS[*]}" >&2
            exit 1
          fi

          if ! grep -Eq 'https://github\.com/remarkablepc/Page2Divi/releases(/latest)?' README.md; then
            echo "README.md does not contain the expected public release links." >&2
            exit 1
          fi

          if grep -Eq 'https://github\.com/remarkablepc/(Page2Divi-src|Page2Divi-exe)' README.md; then
            echo "README.md contains incorrect repository links." >&2
            exit 1
          fi

          VERSION_DIR="$VERSION"
          WORK_DIR="$RUNNER_TEMP/publish-work"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_dir=$VERSION_DIR" >> "$GITHUB_OUTPUT"
          echo "work_dir=$WORK_DIR" >> "$GITHUB_OUTPUT"

      - name: Resolve Windows artifact run
        id: windows-run
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID=""
          RUNS_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/private-build-windows.yml/runs?status=success&per_page=30")"

          while IFS= read -r CANDIDATE; do
            [[ -n "$CANDIDATE" ]] || continue
            ARTIFACTS_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE}/artifacts?per_page=100")"
            if jq -e --arg name "$WINDOWS_ARTIFACT_NAME" '.artifacts[] | select(.name == $name and .expired == false)' <<<"$ARTIFACTS_JSON" >/dev/null; then
              RUN_ID="$CANDIDATE"
              break
            fi
          done < <(jq -r '.workflow_runs[] | select(.status == "completed" and .conclusion == "success") | .id' <<<"$RUNS_JSON")

          if [[ -z "$RUN_ID" ]]; then
            echo "Windows artifact is missing." >&2
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Resolve macOS artifact run
        id: macos-run
        shell: bash
        run: |
          set -euo pipefail

          RUN_ID=""
          RUNS_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/private-build-macos.yml/runs?status=success&per_page=30")"

          while IFS= read -r CANDIDATE; do
            [[ -n "$CANDIDATE" ]] || continue
            ARTIFACTS_JSON="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${CANDIDATE}/artifacts?per_page=100")"
            if jq -e --arg name "$MAC_ARTIFACT_NAME" '.artifacts[] | select(.name == $name and .expired == false)' <<<"$ARTIFACTS_JSON" >/dev/null; then
              RUN_ID="$CANDIDATE"
              break
            fi
          done < <(jq -r '.workflow_runs[] | select(.status == "completed" and .conclusion == "success") | .id' <<<"$RUNS_JSON")

          if [[ -z "$RUN_ID" ]]; then
            echo "macOS artifact is missing." >&2
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.WINDOWS_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts/windows
          repository: ${{ github.repository }}
          run-id: ${{ steps.windows-run.outputs.run_id }}
          github-token: ${{ env.GH_TOKEN }}

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.MAC_ARTIFACT_NAME }}
          path: ${{ runner.temp }}/artifacts/macos
          repository: ${{ github.repository }}
          run-id: ${{ steps.macos-run.outputs.run_id }}
          github-token: ${{ env.GH_TOKEN }}

      - name: Validate downloaded binaries
        id: binaries
        shell: bash
        run: |
          set -euo pipefail

          VERSION='${{ steps.validate.outputs.version }}'
          WINDOWS_ZIP="$(find "$RUNNER_TEMP/artifacts/windows" -maxdepth 1 -type f -name '*.zip' | head -n 1)"
          MACOS_ZIP="$(find "$RUNNER_TEMP/artifacts/macos" -maxdepth 1 -type f -name '*.zip' | head -n 1)"

          if [[ -z "$WINDOWS_ZIP" || ! -f "$WINDOWS_ZIP" ]]; then
            echo "Windows artifact is missing." >&2
            exit 1
          fi

          if [[ -z "$MACOS_ZIP" || ! -f "$MACOS_ZIP" ]]; then
            echo "macOS artifact is missing." >&2
            exit 1
          fi

          WINDOWS_SIZE="$(stat -c%s "$WINDOWS_ZIP")"
          MACOS_SIZE="$(stat -c%s "$MACOS_ZIP")"

          if (( WINDOWS_SIZE < 1048576 )); then
            echo "Windows artifact size is below 1MB." >&2
            exit 1
          fi

          if (( MACOS_SIZE < 1048576 )); then
            echo "macOS artifact size is below 1MB." >&2
            exit 1
          fi

          WINDOWS_BASENAME="$(basename "$WINDOWS_ZIP")"
          MACOS_BASENAME="$(basename "$MACOS_ZIP")"

          if [[ "$WINDOWS_BASENAME" != *"$VERSION"* ]]; then
            echo "Windows binary filename does not contain version $VERSION: $WINDOWS_BASENAME" >&2
            exit 1
          fi

          if [[ "$MACOS_BASENAME" != *"$VERSION"* ]]; then
            echo "macOS binary filename does not contain version $VERSION: $MACOS_BASENAME" >&2
            exit 1
          fi

          if ! unzip -l "$WINDOWS_ZIP" | grep -Eq 'Page2Divi\.exe$'; then
            echo "Windows binary zip does not contain Page2Divi.exe." >&2
            exit 1
          fi

          if ! unzip -l "$MACOS_ZIP" | grep -Eq 'Page2Divi\.app/?'; then
            echo "macOS binary zip does not contain Page2Divi.app." >&2
            exit 1
          fi

          echo "windows_zip=$WINDOWS_ZIP" >> "$GITHUB_OUTPUT"
          echo "macos_zip=$MACOS_ZIP" >> "$GITHUB_OUTPUT"
          echo "windows_name=$WINDOWS_BASENAME" >> "$GITHUB_OUTPUT"
          echo "macos_name=$MACOS_BASENAME" >> "$GITHUB_OUTPUT"

      - name: Ensure no unexpected files in artifacts
        shell: bash
        run: |
          set -euo pipefail

          WINDOWS_ZIP='${{ steps.binaries.outputs.windows_zip }}'
          MACOS_ZIP='${{ steps.binaries.outputs.macos_zip }}'

          ALLOWED_WINDOWS="Page2Divi.exe"
          ALLOWED_MACOS="Page2Divi.app"

          WINDOWS_CONTENTS=$(unzip -l "$WINDOWS_ZIP" | awk '{print $4}' | grep -v '^$')
          for FILE in $WINDOWS_CONTENTS; do
            if [[ "$FILE" != "$ALLOWED_WINDOWS" ]]; then
              echo "Unexpected file in Windows artifact: $FILE" >&2
              exit 1
            fi
          done

          MACOS_CONTENTS=$(unzip -l "$MACOS_ZIP" | awk '{print $4}' | grep -v '^$')
          for FILE in $MACOS_CONTENTS; do
            if [[ "$FILE" != "$ALLOWED_MACOS" && "$FILE" != "$ALLOWED_MACOS/" ]]; then
              echo "Unexpected file in macOS artifact: $FILE" >&2
              exit 1
            fi
          done

          echo "Artifacts contain only expected files."

      - name: Clone public repository
        shell: bash
        run: |
          set -euo pipefail

          rm -rf '${{ steps.validate.outputs.work_dir }}'
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${PUBLIC_REPO}.git" '${{ steps.validate.outputs.work_dir }}'

      - name: Copy release files into version folder
        shell: bash
        run: |
          set -euo pipefail

          VERSION='${{ steps.validate.outputs.version }}'
          VERSION_DIR='${{ steps.validate.outputs.version_dir }}'
          WORK_DIR='${{ steps.validate.outputs.work_dir }}'
          TARGET_DIR="$WORK_DIR/$VERSION_DIR"

          if [[ "$VERSION_DIR" != "$VERSION" ]]; then
            echo "Version folder mismatch: $VERSION_DIR vs $VERSION" >&2
            exit 1
          fi

          if [[ -e "$TARGET_DIR" ]]; then
            echo "Version folder already exists in public repo: $VERSION_DIR" >&2
            exit 1
          fi

          mkdir -p "$TARGET_DIR"

          cp README.md "$TARGET_DIR/README.md"
          cp '${{ steps.binaries.outputs.windows_zip }}' "$TARGET_DIR/${{ steps.binaries.outputs.windows_name }}"
          cp '${{ steps.binaries.outputs.macos_zip }}' "$TARGET_DIR/${{ steps.binaries.outputs.macos_name }}"

      - name: Validate copied files and links
        shell: bash
        run: |
          set -euo pipefail

          VERSION='${{ steps.validate.outputs.version }}'
          VERSION_DIR='${{ steps.validate.outputs.version_dir }}'
          WORK_DIR='${{ steps.validate.outputs.work_dir }}'
          TARGET_DIR="$WORK_DIR/$VERSION_DIR"

          if [[ ! -d "$TARGET_DIR" ]]; then
            echo "Version folder was not created: $TARGET_DIR" >&2
            exit 1
          fi

          if [[ "$(basename "$TARGET_DIR")" != "$VERSION" ]]; then
            echo "Version folder mismatch after copy." >&2
            exit 1
          fi

          [[ -f "$TARGET_DIR/README.md" ]]
          [[ -f "$TARGET_DIR/${{ steps.binaries.outputs.windows_name }}" ]]
          [[ -f "$TARGET_DIR/${{ steps.binaries.outputs.macos_name }}" ]]

          if ! grep -F "$VERSION" "$TARGET_DIR/README.md" >/dev/null; then
            echo "Copied README.md is missing version $VERSION." >&2
            exit 1
          fi

          if ! grep -Eq 'https://github\.com/remarkablepc/Page2Divi/releases(/latest)?' "$TARGET_DIR/README.md"; then
            echo "Copied README.md failed link validation." >&2
            exit 1
          fi

      - name: Commit and push public release
        shell: bash
        run: |
          set -euo pipefail

          VERSION='${{ steps.validate.outputs.version }}'
          WORK_DIR='${{ steps.validate.outputs.work_dir }}'

          cd "$WORK_DIR"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          git add "$VERSION"

          if git diff --cached --quiet; then
            echo "No files were staged for publication." >&2
            exit 1
          fi

          git commit -m "Publish $VERSION"
          git push origin HEAD
