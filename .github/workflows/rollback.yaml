name: Rollback Public Release

on:
  workflow_run:
    workflows: ["Publish Public Release"]
    types: [completed]

jobs:
  rollback:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest

    steps:
      - name: Get previous release
        id: prev
        uses: actions/github-script@v7
        with:
          script: |
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo
            });

            // The first release is the newest; the second is the previous stable
            if (releases.data.length < 2) {
              core.setFailed("No previous release found to roll back to.");
              return;
            }

            core.setOutput("tag", releases.data[1].tag_name);
            core.setOutput("id", releases.data[1].id);

      - name: Re-publish previous release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = core.getOutput("tag");
            const id = core.getOutput("id");

            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: id,
              draft: false,
              prerelease: false
            });

            console.log(`Rollback complete. Restored release ${tag}.`);
S
